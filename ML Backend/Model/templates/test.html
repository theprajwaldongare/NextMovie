<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextMovie</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="main">
        <div class="cont">
            Enter the summary (Bollywood Movie):
        </div>
        <input type="text" class="inp" id="inp">

        <div class="movies" id="movies"></div>
    </div>

    <div class="main">
        <div class="cont">
            Enter the summary (Hollywood Movie):
        </div>
        <input type="text" class="inp" id="hinp">

        <div class="movies" id="hmovies"></div>
    </div>
</body>
<script>
    let inp = document.getElementById("inp")
    let display = document.getElementById("movies")
    inp.addEventListener("keydown",async(event)=>{
        if(event.key=="Enter"){
            let inputVal = inp.value
            let data = {
                "bmovie":inputVal
            }
            let response = await fetch("/bollywood",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(data)
            })
            let reply = await response.json()
            console.log(reply.message)
            display.innerText = reply.message.join("\n\n");
            
            
        }
    })


    let hinp = document.getElementById("hinp")
    let hdisplay = document.getElementById("hmovies")
    hinp.addEventListener("keydown",async(event)=>{
        if(event.key=="Enter"){
            let hinputVal = hinp.value
            let hdata = {
                "hmovie":hinputVal
            }
            let hresponse = await fetch("/hollywood",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(hdata)
            })
            let hreply = await hresponse.json()
            console.log(hreply.message)
            hdisplay.innerText = hreply.message.join("\n\n");
            
            
        }
    })
</script>
</html>
